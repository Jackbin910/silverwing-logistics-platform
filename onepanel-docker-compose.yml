# ========================================
# OnePanel 一键部署配置文件（合并版）
# ========================================
# 使用说明：
# 1. 此文件为全量合并版，适用于不想拆分部署的场景
# 2. 推荐拆分部署，见 onepanel-infra-compose.yml + onepanel-services-compose.yml
# 3. 所有镜像已使用 docker.1ms.run 镜像加速源
# 4. 微服务连接信息由 Nacos 配置中心统一管理，无需在此配置数据库密码等
# 5. 部署前需先在 Nacos 控制台导入公共配置（见 nacos-config-templates/ 目录）
# 6. 所有外部访问统一通过 Nginx 反向代理（端口 80/443）
# ========================================

version: '3.8'

# 公共环境变量（所有微服务共享，只需配一份 Nacos 连接信息）
x-common-env: &common-env
  NACOS_SERVER_ADDR: nacos:8848
  NACOS_NAMESPACE: ${NACOS_NAMESPACE:-prod}
  NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
  NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos_password}

services:
  # ==================== 基础设施层 ====================

  # MySQL 数据库
  mysql:
    image: docker.1ms.run/library/mysql:8.0.40
    container_name: mysql-server
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-silverwing_logistics}
      MYSQL_USER: ${MYSQL_USER:-silverwing}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-silverwing_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/xxl-job.sql:/docker-entrypoint-initdb.d/02-xxl-job.sql
    networks:
      silverwing-network:
        aliases:
          - mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # Redis 缓存
  redis:
    image: docker.1ms.run/library/redis:7.0.15
    container_name: redis-server
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    networks:
      silverwing-network:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  # PGVector 向量数据库（PostgreSQL + pgvector 扩展）
  pgvector:
    image: docker.1ms.run/pgvector/pgvector:pg16
    container_name: pgvector-server
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-silverwing}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-silverwing_password}
      POSTGRES_DB: ${PGVECTOR_DATABASE:-silverwing_vector}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      silverwing-network:
        aliases:
          - pgvector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-silverwing} -d ${PGVECTOR_DATABASE:-silverwing_vector}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # Nacos 单机版
  nacos:
    image: docker.1ms.run/nacos/nacos-server:v2.4.3
    container_name: nacos-standalone
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=${NACOS_SERVICE_DB_NAME:-nacos_config}
      - MYSQL_SERVICE_USER=${NACOS_SERVICE_USER:-nacos}
      - MYSQL_SERVICE_PASSWORD=${NACOS_SERVICE_PASSWORD:-nacos_password}
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true
      - NACOS_SERVER_PORT=8848
      - NACOS_APPLICATION_PORT=8848
      - PREFER_HOST_MODE=hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
    networks:
      silverwing-network:
        aliases:
          - nacos
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  # RabbitMQ 消息队列（含内置管理控制台）
  rabbitmq:
    image: docker.1ms.run/library/rabbitmq:3.13.7-management
    container_name: rabbitmq-server
    hostname: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-admin}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-rabbitmq_password}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      silverwing-network:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # XXL-JOB 分布式任务调度（含内置控制台）
  xxl-job-admin:
    image: docker.1ms.run/xuxueli/xxl-job-admin:2.4.2
    container_name: xxl-job-admin
    ports:
      - "${XXLJOB_PORT:-19080}:8080"
    environment:
      - PARAMS=--spring.datasource.url=jdbc:mysql://mysql:3306/${XXLJOB_DB_NAME:-xxl_job}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai --spring.datasource.username=${MYSQL_USER:-silverwing} --spring.datasource.password=${MYSQL_PASSWORD:-silverwing_password} --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver --xxl.job.accessToken=${XXLJOB_ACCESS_TOKEN:-silverwing-xxl-job-token}
      - JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./data/xxl-job/logs:/data/applogs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      silverwing-network:
        aliases:
          - xxl-job-admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/xxl-job-admin/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  # Nginx 反向代理
  nginx:
    image: docker.1ms.run/library/nginx:1.26-alpine
    container_name: nginx-server
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx-conf/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx-conf/conf/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx-conf/logs:/var/log/nginx
      - ./data/nginx/cert:/etc/nginx/cert:ro
    networks:
      silverwing-network:
        aliases:
          - nginx
    depends_on:
      - silverwing-gateway
      - silverwing-auth
      - silverwing-core-service
      - silverwing-digital-twin
      - silverwing-ai-service
      - silverwing-ops-service
      - silverwing-integration
      - silverwing-admin-web
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  # ==================== 微服务层 ====================
  # 数据库/Redis/RabbitMQ 连接信息由 Nacos 配置中心统一管理，
  # 各服务启动后自动从 Nacos 拉取，无需在此配置。

  # Gateway 服务
  silverwing-gateway:
    image: silverwing/gateway:${APP_VERSION:-1.0.0}
    container_name: silverwing-gateway
    expose:
      - "8080"
    environment:
      <<: *common-env
      JAVA_OPTS: ${GATEWAY_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Auth 服务
  silverwing-auth:
    image: silverwing/auth:${APP_VERSION:-1.0.0}
    container_name: silverwing-auth
    expose:
      - "8081"
    environment:
      <<: *common-env
      JAVA_OPTS: ${AUTH_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Core Service
  silverwing-core-service:
    image: silverwing/core-service:${APP_VERSION:-1.0.0}
    container_name: silverwing-core-service
    expose:
      - "8082"
    environment:
      <<: *common-env
      JAVA_OPTS: ${CORE_SERVICE_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Digital Twin 服务
  silverwing-digital-twin:
    image: silverwing/digital-twin:${APP_VERSION:-1.0.0}
    container_name: silverwing-digital-twin
    expose:
      - "8083"
    environment:
      <<: *common-env
      JAVA_OPTS: ${DIGITAL_TWIN_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # AI Service
  silverwing-ai-service:
    image: silverwing/ai-service:${APP_VERSION:-1.0.0}
    container_name: silverwing-ai-service
    expose:
      - "8084"
    environment:
      <<: *common-env
      JAVA_OPTS: ${AI_SERVICE_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # OPS Service
  silverwing-ops-service:
    image: silverwing/ops-service:${APP_VERSION:-1.0.0}
    container_name: silverwing-ops-service
    expose:
      - "8085"
    environment:
      <<: *common-env
      JAVA_OPTS: ${OPS_SERVICE_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Integration Service
  silverwing-integration:
    image: silverwing/integration:${APP_VERSION:-1.0.0}
    container_name: silverwing-integration
    expose:
      - "8086"
    environment:
      <<: *common-env
      JAVA_OPTS: ${INTEGRATION_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Admin Web Service
  silverwing-admin-web:
    image: silverwing/admin-web:${APP_VERSION:-1.0.0}
    container_name: silverwing-admin-web
    expose:
      - "8087"
    environment:
      <<: *common-env
      JAVA_OPTS: ${ADMIN_WEB_JAVA_OPTS}
    networks:
      - silverwing-network
    depends_on:
      - nacos
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  silverwing-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-data:
  pgvector-data:
