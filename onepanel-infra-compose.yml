# ========================================
# OnePanel 基础设施部署配置
# ========================================
# 部署说明：
# 1. 在 OnePanel 中创建应用「银翼-基础设施」
# 2. 将此文件内容作为 docker-compose.yml
# 3. 配置好 .env 环境变量后部署
# 4. 等待所有服务健康后，再部署微服务应用
# ========================================

services:
  # ==================== 基础设施层 ====================

  # MySQL 数据库
  mysql:
    image: docker.1ms.run/library/mysql:8.0.40
    container_name: mysql-server
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/xxl-job.sql:/docker-entrypoint-initdb.d/02-xxl-job.sql
    networks:
      silverwing-network:
        aliases:
          - mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # Redis 缓存
  redis:
    image: docker.1ms.run/library/redis:6.2.18
    container_name: redis-server
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    networks:
      silverwing-network:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  # PGVector 向量数据库（PostgreSQL + pgvector 扩展）
  pgvector:
    image: docker.1ms.run/pgvector/pgvector:pg16
    container_name: pgvector-server
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-silverwing}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-silverwing_password}
      POSTGRES_DB: ${PGVECTOR_DATABASE:-silverwing_vector}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      silverwing-network:
        aliases:
          - pgvector
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-silverwing} -d ${PGVECTOR_DATABASE:-silverwing_vector}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # Nacos 单机版
  nacos:
    image: docker.1ms.run/nacos/nacos-server:v2.4.3
    container_name: nacos-standalone
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=${NACOS_SERVICE_DB_NAME}
      - MYSQL_SERVICE_USER=${NACOS_SERVICE_USER}
      - MYSQL_SERVICE_PASSWORD=${NACOS_SERVICE_PASSWORD}
      - MYSQL_SERVICE_DB_PARAM=characterEncoding=utf8&connectTimeout=10000&socketTimeout=30000&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - NACOS_SERVER_PORT=8848
      - NACOS_APPLICATION_PORT=8848
      - PREFER_HOST_MODE=hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./data/nacos/logs:/home/nacos/logs
    networks:
      silverwing-network:
        aliases:
          - nacos
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  # RabbitMQ 消息队列（含内置管理控制台，端口 15672）
  # 默认账号: admin / 密码见 .env
  rabbitmq:
    image: docker.1ms.run/library/rabbitmq:3.13.7-management
    container_name: rabbitmq-server
    hostname: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      silverwing-network:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # XXL-JOB 分布式任务调度（含内置控制台）
  xxl-job-admin:
    image: docker.1ms.run/xuxueli/xxl-job-admin:2.4.2
    container_name: xxl-job-admin
    ports:
      - "${XXLJOB_PORT:-19080}:8080"
    environment:
      - PARAMS=--spring.datasource.url=jdbc:mysql://mysql:3306/${XXLJOB_DB_NAME:-xxl_job}?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai --spring.datasource.username=${MYSQL_USER} --spring.datasource.password=${MYSQL_PASSWORD} --spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver --xxl.job.accessToken=${XXLJOB_ACCESS_TOKEN:-silverwing-xxl-job-token}
      - JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - ./data/xxl-job/logs:/data/applogs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      silverwing-network:
        aliases:
          - xxl-job-admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/xxl-job-admin/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always

  # Nginx 反向代理
  nginx:
    image: docker.1ms.run/library/nginx:1.26-alpine
    container_name: nginx-server
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./docker/nginx-conf/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx-conf/conf/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx-conf/logs:/var/log/nginx
      - ./data/nginx/cert:/etc/nginx/cert:ro
    networks:
      silverwing-network:
        aliases:
          - nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

networks:
  silverwing-network:
    # 复用手工创建的外部网络
    name: silverwing-network
    external: true

volumes:
  mysql-data:
  pgvector-data:
