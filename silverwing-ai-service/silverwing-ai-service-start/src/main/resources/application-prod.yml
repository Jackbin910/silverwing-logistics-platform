spring:
  # 导入 Nacos 配置
  config:
    import:
      - nacos:silverwing-ai-service.yml
      - nacos:common-redis.yml
      - nacos:common-pgvector.yml
      - nacos:common-rabbitmq.yml
      - nacos:common-sa-token.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.31.94:8848}
        namespace: cc872612-5a94-48a2-85ed-e743bac31147
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        timeout: 30000
      config:
        server-addr: ${NACOS_SERVER_ADDR:192.168.31.94:8848}
        namespace: cc872612-5a94-48a2-85ed-e743bac31147
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml
        timeout: 30000
  # 文件上传大小限制（RAG 文档上传）
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# 对象存储（RustFS / MinIO 等 S3 协议，RAG 原始文件持久化）
# 说明：Nacos 的 silverwing-ai-service.yml 中若已配置本段，将以 Nacos 为准；
# 此处作为 Nacos 缺失时的本地兜底配置。
silverwing:
  storage:
    enabled: true
    endpoint: ${RUSTFS_ENDPOINT:-192.168.31.94:9000}
    access-key: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
    secret-key: ${RUSTFS_SECRET_KEY:-rustfsadmin}
    bucket: ${RUSTFS_BUCKET:-silverwing}
    region: ${RUSTFS_REGION:-us-east-1}
    path-style-access: true
    auto-create-bucket: true
