spring:
  # 导入 Nacos 配置
  config:
    import:
      - nacos:silverwing-ai-service.yml
      - nacos:common-redis.yml
      - nacos:common-pgvector.yml
      - nacos:common-rabbitmq.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: ${NACOS_NAMESPACE:e5ec15ee-9d0a-40af-8791-e99227157224}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: ${NACOS_NAMESPACE:e5ec15ee-9d0a-40af-8791-e99227157224}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml

