spring:
  # 导入 Nacos 配置
  config:
    import:
      - nacos:silverwing-ai-service.yml
      - nacos:common-redis.yml
      - nacos:common-pgvector.yml
      - nacos:common-rabbitmq.yml
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: ${NACOS_NAMESPACE:b7273740-ffae-4c91-9e78-ba1360e42a0e}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        # 禁用Nacos优雅关机功能,避免启动时Bean生命周期冲突
        graceful-shutdown:
          enabled: false
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos:8848}
        namespace: ${NACOS_NAMESPACE:b7273740-ffae-4c91-9e78-ba1360e42a0e}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml

