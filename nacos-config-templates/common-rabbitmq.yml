# ========================================
# Nacos 公共配置模板 - RabbitMQ
# ========================================
# Data ID: common-rabbitmq.yml
# Group: DEFAULT_GROUP
# 格式: YAML
# ========================================

spring:
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: admin
    password: 123456
    # 虚拟主机
    virtual-host: /
    # 发布确认
    publisher-confirm-type: correlated
    # 发布返回
    publisher-returns: true
    # 消费者确认模式
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
