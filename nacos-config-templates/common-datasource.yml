# ========================================
# Nacos 公共配置模板 - 数据库连接
# ========================================
# Data ID: common-datasource.yml
# Group: DEFAULT_GROUP
# 格式: YAML
# ========================================
# 部署说明：
# 在 Nacos 控制台 (http://<nacos-host>:8848/nacos) 中，
# 进入「配置管理」→「配置列表」→ 创建配置，
# 填入以下信息：
#   Data ID:  common-datasource.yml
#   Group:    DEFAULT_GROUP
#   格式:     YAML
# ========================================

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/silverwing_logistics?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: silverwing
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000

# MyBatis Plus 公共配置（需要数据库的服务共享）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
