# ========================================
# Nacos 公共配置模板 - Redis 连接
# ========================================
# Data ID: common-redis.yml
# Group: DEFAULT_GROUP
# 格式: YAML
# ========================================

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      # password: ${REDIS_PASSWORD:}  # 如果 Redis 设置了密码，取消注释并填写
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 200
          # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms
          # 连接池中的最大空闲连接
          max-idle: 10
          # 连接池中的最小空闲连接
          min-idle: 0
