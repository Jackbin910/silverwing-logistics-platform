# ========================================
# Nacos 公共配置模板 - 监控指标（Actuator / Prometheus）
# ========================================
# Data ID: common-monitor.yml
# Group: DEFAULT_GROUP
# 格式: YAML
# ========================================
# 说明：
# silverwing-common 模块已通过 MonitorDefaultsEnvironmentPostProcessor 注入默认监控配置，
# 所有微服务默认暴露 /actuator/health 与 /actuator/prometheus 端点，无需额外配置。
#
# 如需调整某项配置，可在此处覆盖默认值，并在各服务的 application.yml 中通过
# spring.config.import 引入本配置（optional:nacos:common-monitor.yml）。
# 也可直接在服务自身的 application.yml 中覆盖。
# ========================================

management:
    endpoints:
        web:
            base-path: /actuator
            # 暴露的端点，默认 health,info,prometheus
            # 如需更多端点（如 metrics、env、loggers），可在此扩展
            exposure:
                include: health,info,prometheus
    endpoint:
        health:
            show-details: always
            show-components: always
    # 为所有 Micrometer 指标附加公共标签，便于 Prometheus 按服务维度聚合
    metrics:
        tags:
            application: ${spring.application.name}
