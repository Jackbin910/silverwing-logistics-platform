# OpenResty alpine 镜像默认无 nginx 用户，以 root 运行（与 OpenResty 默认行为一致）
# 如需降权：在镜像内创建 nginx 用户并 chown 日志目录后改为 user nginx;
user  root;
worker_processes  auto;

error_log  /usr/local/openresty/nginx/logs/error.log  notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # OpenResty Lua 配置：共享字典用于限流计数，lua_package_path 指向挂载的 lua 脚本目录
    lua_shared_dict limit_req_store 10m;
    lua_package_path "/usr/local/openresty/nginx/conf/lua/?.lua;;";

    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /usr/local/openresty/nginx/logs/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss;

    # Include server configurations
    include /usr/local/openresty/nginx/conf/conf.d/*.conf;
}
