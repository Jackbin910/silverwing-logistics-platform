# Docker 内置 DNS，运行时解析上游（启动时不校验，微服务未起时返回 502）
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen       80;
    server_name  localhost;

    # 健康检查端点（nginx 自身可用性，不依赖上游）
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 统一入口：所有请求转发到 Gateway 8080
    # Gateway 路由规则: /auth/**, /core/**, /twin/**, /ai/**, /ops/**, /integration/**, /admin/**
    set $gateway_upstream silverwing-gateway:8080;

    # /api/ 前缀请求：去掉前缀后转发到 gateway
    # 例如 /api/auth/login → gateway 收到 /auth/login → 路由到 silverwing-auth
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其他请求直接转发到 gateway（/auth/**, /admin/** 等路由前缀原样透传）
    location / {
        proxy_pass http://$gateway_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
