# Redis 配置文件

# 绑定地址（允许所有 IP 访问，内网环境建议改为具体 IP）
bind 0.0.0.0

# 端口
port 6379

# 保护模式（生产环境建议开启并设置密码）
protected-mode no

# 密码（可选，取消注释并设置密码）
# requirepass your_redis_password

# Daemonize（Docker 中不需要）
daemonize no

# 日志
loglevel notice
logfile ""

# 数据库数量
databases 16

# RDB 持久化
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 慢查询
slowlog-log-slower-than 10000
slowlog-max-len 128

# 网络
tcp-backlog 511
timeout 0
tcp-keepalive 300
