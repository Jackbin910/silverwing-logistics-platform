# ========================================
# Grafana 数据源自动配置
# ========================================
# 启动时自动创建 Prometheus 数据源，无需手动在 UI 配置
# ========================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # 通过容器名访问同网络的 Prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      # 与 Prometheus 的 external_labels 对齐
      timeInterval: 15s
