server:
    port: ${SERVER_PORT:8083}

spring:
    profiles:
        active: prod
    application:
        name: silverwing-digital-twin
    # 导入 Nacos 配置
    config:
        import:
            - optional:nacos:silverwing-digital-twin.yml
            - optional:nacos:common-redis.yml
            - optional:nacos:common-sa-token.yml
    cloud:
        nacos:
            discovery:
                server-addr: ${NACOS_SERVER_ADDR:http://192.168.164.128:8848}
                namespace: ${NACOS_NAMESPACE:b7273740-ffae-4c91-9e78-ba1360e42a0e}
                group: ${NACOS_GROUP:DEFAULT_GROUP}
            config:
                server-addr: ${NACOS_SERVER_ADDR:http://192.168.164.128:8848}
                namespace: ${NACOS_NAMESPACE:b7273740-ffae-4c91-9e78-ba1360e42a0e}
                group: ${NACOS_GROUP:DEFAULT_GROUP}
                file-extension: yml

    # 数据库配置（本地配置，不依赖Nacos）
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://192.168.164.128:3306/silverwing_digital_twin?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
        username: root
        password: 123456
        druid:
            initial-size: 5
            min-idle: 5
            max-active: 20
            max-wait: 60000


# MyBatis-Plus 配置
mybatis-plus:
    # 搜索 Mapper XML 文件的路径
    mapper-locations: classpath*:/mapper/**/*.xml
    # 实体扫描，多个 package 用逗号或者分号分隔
    type-aliases-package: com.silverwing.twin.domain
    global-config:
        # 数据库相关配置
        db-config:
            # 主键类型: AUTO-数据库自增
            id-type: AUTO
            # 逻辑删除配置
            logic-delete-field: deleted
            logic-delete-value: 1
            logic-not-delete-value: 0
        # 关闭 Banner
        banner: false
    configuration:
        # 驼峰命名规则
        map-underscore-to-camel-case: true
        # 配置打印 SQL（开发环境）
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
